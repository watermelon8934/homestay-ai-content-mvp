server:
  port: ${PORT:8081}

spring:
  application:
    name: homestay-ai-backend

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:8080,http://localhost:5173,http://127.0.0.1:8080,http://127.0.0.1:5173}
    allowed-origin-patterns: ${APP_CORS_ALLOWED_ORIGIN_PATTERNS:https://*.vercel.app}
  ai:
    base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
    api-key: ${DEEPSEEK_API_KEY:}
    model: ${DEEPSEEK_MODEL:deepseek-chat}
    max-tokens: ${DEEPSEEK_MAX_TOKENS:2200}
    temperature: ${DEEPSEEK_TEMPERATURE:0.7}
