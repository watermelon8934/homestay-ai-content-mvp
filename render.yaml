services:
  - type: web
    name: homestay-ai-backend
    runtime: docker
    plan: free
    rootDir: backend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: APP_CORS_ALLOWED_ORIGINS
        sync: false
      - key: DEEPSEEK_MODEL
        value: deepseek-chat
